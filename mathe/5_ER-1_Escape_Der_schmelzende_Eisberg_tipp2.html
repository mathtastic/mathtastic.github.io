<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>&#128273; Tipp &mdash; Schloss 2</title><style>body{font-family:Nunito,Segoe UI,sans-serif;background:#F0EDE8;margin:0;padding:18px;}.card{max-width:420px;margin:0 auto;background:#FDF6E4;border:1.5px solid #E3CC93;border-radius:12px;padding:16px 20px;}h1{font-size:19px;margin:0 0 8px;}p{font-size:14.5px;line-height:1.6;margin:7px 0;}b{color:#1A7A50;}</style></head><body><div class="card"><h1 style="color:#0E7490;">&#128273; Tipp &mdash; Schloss 2</h1><p>Rechne <b>alle f&uuml;nf</b> Kisten aus, nicht nur eine.</p><p>Vier Kisten zeigen dann <b>dieselbe Zahl</b> &mdash; die sind echt. Die eine Kiste mit einer <b>anderen Zahl</b> ist die F&auml;lschung.</p><p>Das Ergebnis der F&auml;lschung ist deine Ziffer. Schau besonders genau auf eine <b>Geteilt-Aufgabe</b> &hellip;</p></div></body></html>
