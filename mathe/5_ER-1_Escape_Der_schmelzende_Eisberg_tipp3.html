<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>&#128273; Tipp &mdash; Schloss 3</title><style>body{font-family:Nunito,Segoe UI,sans-serif;background:#F0EDE8;margin:0;padding:18px;}.card{max-width:420px;margin:0 auto;background:#FDF6E4;border:1.5px solid #E3CC93;border-radius:12px;padding:16px 20px;}h1{font-size:19px;margin:0 0 8px;}p{font-size:14.5px;line-height:1.6;margin:7px 0;}b{color:#1A7A50;}</style></head><body><div class="card"><h1 style="color:#2E6B45;">&#128273; Tipp &mdash; Schloss 3</h1><p><b>1 km = 1000 m.</b> Um von Metern zu Kilometern zu kommen, teilst du durch 1000.</p><p>3000 m = <b>3 km</b>. Die zweite Etappe ist schon in km. Die dritte rechnest du genauso um wie die erste.</p><p>Dann <b>addiere</b> die drei km-Zahlen. Die Summe ist eine einzelne Ziffer.</p></div></body></html>
