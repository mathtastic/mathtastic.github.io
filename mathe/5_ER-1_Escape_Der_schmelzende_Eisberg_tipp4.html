<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>&#128273; Tipp &mdash; Schloss 4</title><style>body{font-family:Nunito,Segoe UI,sans-serif;background:#F0EDE8;margin:0;padding:18px;}.card{max-width:420px;margin:0 auto;background:#FDF6E4;border:1.5px solid #E3CC93;border-radius:12px;padding:16px 20px;}h1{font-size:19px;margin:0 0 8px;}p{font-size:14.5px;line-height:1.6;margin:7px 0;}b{color:#1A7A50;}</style></head><body><div class="card"><h1 style="color:#6D28D9;">&#128273; Tipp &mdash; Schloss 4</h1><p>Rechne die vier Aufgaben. Beispiel: <b>14 &minus; 12 = 2</b>.</p><p>Suche die <b>2</b> in der Tabelle &mdash; sie steht bei <b>B</b>. Schreib B auf. Mach das mit allen vier Ergebnissen.</p><p>Die Buchstaben ergeben ein Wort. <b>Z&auml;hle die Buchstaben</b> &mdash; diese Anzahl ist deine letzte Ziffer.</p></div></body></html>
