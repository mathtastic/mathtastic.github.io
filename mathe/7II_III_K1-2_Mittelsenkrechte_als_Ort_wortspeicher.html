<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wortspeicher &middot; K1-2 Mittelsenkrechte</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Lora',serif;color:#1f262b;background:#f6efe9;padding:22px;line-height:1.6}
.card{max-width:620px;margin:0 auto;background:#fff;border:1.3px solid #C2571A;border-radius:12px;padding:22px 24px}
h1{font-family:'Nunito',sans-serif;font-size:21px;color:#C2571A;margin-bottom:4px}
.sub{font-family:'Nunito',sans-serif;font-size:12px;color:#8a7a72;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.ws{border:1.6px dashed #C2571A;background:#fdf7f3;border-radius:9px;padding:14px 16px}
.ws-h{font-family:'Nunito',sans-serif;font-weight:800;color:#C2571A;font-size:15px;margin-bottom:10px}
.ws-words{display:flex;flex-wrap:wrap;gap:9px}.ws-words span{display:inline-block;background:#C2571A;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;padding:7px 15px;border-radius:16px}
.tip{font-size:14px;color:#3a4654;margin-top:12px}.def{font-size:14px;color:#444;margin-top:14px}.def b{color:#C2571A}</style></head>
<body><div class="card"><h1>&#128221; Wortspeicher</h1>
<div class="sub">Merksatz &bdquo;Die Mittelsenkrechte&ldquo; &middot; Klasse 7</div>
<div class="ws"><div class="ws-h">Diese W&ouml;rter passen in den Merksatz:</div>
<div class="ws-words"><span>gleich</span><span>=</span><span>senkrecht</span><span>halbiert</span></div>
<div class="tip">Setze jedes Wort an die passende L&uuml;cke &mdash; ein Wort pro L&uuml;cke.</div></div>
<div class="def"><b>senkrecht</b> = im rechten Winkel (90&deg;) zueinander.<br>
<b>halbiert</b> = teilt die Strecke in zwei gleich lange H&auml;lften.</div></div></body></html>
